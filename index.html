<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>X:ORNO - Diagnostic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="themeSwitch">🌗 Mode auto</button>

  <div id="tabs">
    <button class="tab-button active" onclick="showTab('hardware')">Matériel</button>
    <button class="tab-button" onclick="showTab('updates')">Mises à jour</button>
    <button class="tab-button" onclick="showTab('activation')">Activation</button>
  </div>

  <div id="content">
    <div id="hardware" class="tab active">
      <div class="loading-spinner"></div>
      <p>Chargement des données matérielles...</p>
    </div>

    <div id="updates" class="tab">
      <h1>Mises à jour Windows</h1>
      <button id="updateBtn">Lancer les mises à jour</button>
      <progress id="updateProgress" value="0" max="100" style="width:100%; display:none;"></progress>
      <pre id="updateLog"></pre>
    </div>

    <div id="activation" class="tab">
      <h1>Activation Windows</h1>
      <button id="activateBtn">Lancer MAS_AIO.cmd</button>
      <pre id="activationLog"></pre>
    </div>
  </div>

  <button onclick="clearDebug()">🧹 Effacer Debug</button>
  <div id="debugConsole" style="background:#111;color:#ff4;border-top:1px solid #333;padding:10px;font-family:monospace;font-size:13px;">
    <b>Console Debug</b>
    <pre id="debugLog"></pre>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
